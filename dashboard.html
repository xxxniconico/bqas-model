<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BQAS · 巴菲特量化选股系统</title>
<style>
:root {
  --bg: #1f1633; --bg2: #2a1d47; --bg3: #34255a; --bg4: #3f2d6d;
  --text: #e9e2f5; --text2: #b8a9d4; --text3: #7b6b9e;
  --accent: #c2ef4e; --accent2: #a1d836;
  --green: #4ade80; --amber: #fbbf24; --red: #f87171; --pink: #f472b6; --blue: #60a5fa;
  --border: rgba(194,239,78,0.10); --border2: rgba(194,239,78,0.18);
  --radius: 10px; --radius-sm: 6px;
  --font: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  --mono: 'Cascadia Code','Fira Code','SF Mono','JetBrains Mono',Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ═══ Layout ═══ */
.app{max-width:960px;margin:0 auto;padding:24px 20px 60px}

/* ═══ Header ═══ */
.header{display:flex;align-items:center;gap:12px;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.logo{font-size:1.3rem;font-weight:700;color:var(--accent);white-space:nowrap}
.logo-sub{font-size:0.7rem;color:var(--text3);margin-left:4px;font-weight:400}
.header-right{margin-left:auto;display:flex;gap:8px}
.pill{padding:6px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:0.78rem;cursor:pointer;font-family:var(--font);transition:all 0.2s}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}

/* ═══ Search ═══ */
.search-wrap{position:relative;margin-bottom:24px}
.search-wrap input{width:100%;padding:14px 18px;background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem;font-family:var(--font);outline:none;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--text3)}
.search-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:0 0 var(--radius) var(--radius);max-height:300px;overflow-y:auto;z-index:100;margin-top:2px;display:none}
.search-dropdown.show{display:block}
.search-item{padding:10px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:0.9rem;transition:background 0.15s}
.search-item:hover{background:rgba(194,239,78,0.06)}
.search-item .si-code{color:var(--accent);font-weight:600;font-family:var(--mono);min-width:70px}
.search-item .si-name{color:var(--text)}
.search-item .si-industry{color:var(--text3);font-size:0.75rem}

/* ═══ Score Hero ═══ */
.hero{display:flex;gap:28px;align-items:center;padding:28px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px}
.hero-ring{flex-shrink:0}
.hero-ring svg{width:140px;height:140px}
.hero-info{flex:1}
.hero-name{font-size:1.6rem;font-weight:700}
.hero-code{font-family:var(--mono);color:var(--text3);font-size:0.85rem;margin-left:8px}
.hero-meta{color:var(--text2);font-size:0.82rem;margin-top:6px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.hero-meta .dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.tag{padding:3px 10px;border-radius:12px;font-size:0.72rem;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.tag-ok{background:rgba(74,222,128,0.12);color:var(--green)}
.tag-warn{background:rgba(251,191,36,0.12);color:var(--amber)}
.tag-bad{background:rgba(248,113,113,0.12);color:var(--red)}
.hero-dims{display:flex;gap:20px;margin-top:12px}
.hero-dim{text-align:center}
.hero-dim .hd-val{font-family:var(--mono);font-size:1.3rem;font-weight:700}
.hero-dim .hd-max{font-size:0.6rem;color:var(--text3)}
.hero-dim .hd-label{font-size:0.7rem;color:var(--text3);margin-top:2px}

/* ═══ Section ═══ */
.section{margin-bottom:20px}
.section-title{font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ═══ Cards Grid ═══ */
.grid{display:grid;gap:16px}
.grid2{grid-template-columns:1fr 1fr}
.grid4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}

/* ═══ Factor List ═══ */
.factor-group{margin-bottom:14px}
.factor-group:last-child{margin-bottom:0}
.factor-group-title{font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.factor-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.factor-row:last-child{border:none}
.factor-label{width:100px;font-size:0.82rem;color:var(--text2);flex-shrink:0}
.factor-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.factor-bar{height:100%;border-radius:3px;transition:width 0.6s}
.factor-val{width:40px;text-align:right;font-family:var(--mono);font-size:0.85rem;font-weight:500}

/* ═══ Blacklist ═══ */
.bl-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:0.82rem;border-bottom:1px solid rgba(255,255,255,0.03)}
.bl-row:last-child{border:none}
.bl-icon{width:18px;text-align:center;font-size:0.85rem;flex-shrink:0}
.bl-reason{font-size:0.72rem;color:var(--red);margin-left:auto}

/* ═══ DuPont ═══ */
.dupont{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;padding:10px 0}
.dupont-box{text-align:center;padding:10px 14px;background:var(--bg3);border-radius:var(--radius-sm);min-width:64px}
.dupont-box .dv{font-family:var(--mono);font-size:1.15rem;font-weight:600}
.dupont-box .dl{font-size:0.6rem;color:var(--text3);text-transform:uppercase}
.dupont-op{color:var(--text3);font-size:1.1rem;font-weight:700}

/* ═══ Beneish ═══ */
.mscore-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;font-weight:700;font-size:0.9rem}
.mscore-dot{width:10px;height:10px;border-radius:50%}
.mscore-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.mscore-item{font-size:0.72rem;padding:6px 10px;background:var(--bg3);border-radius:var(--radius-sm)}
.mscore-item b{color:var(--text);display:block;font-family:var(--mono)}

/* ═══ Index Dashboard ═══ */
.idx-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.idx-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;text-align:center}
.idx-card .val{font-family:var(--mono);font-size:1.6rem;font-weight:700;color:var(--accent)}
.idx-card .label{font-size:0.7rem;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.idx-table{width:100%;border-collapse:collapse;font-size:0.82rem}
.idx-table th{text-align:left;padding:10px 8px;color:var(--text3);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid var(--border2)}
.idx-table td{padding:10px 8px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:0.78rem}
.idx-table .name-cell{font-family:var(--font);font-size:0.82rem;color:var(--text)}
.idx-table .best{color:var(--accent);font-weight:600}
.idx-table .good{color:var(--green)}
.idx-table .mid{color:var(--amber)}
.idx-table .low{color:var(--red)}
.idx-table tr:hover{background:rgba(194,239,78,0.03)}
.idx-table .bar-cell{position:relative}
.idx-table .bar-bg{position:absolute;left:0;top:2px;bottom:2px;background:rgba(194,239,78,0.12);border-radius:2px;z-index:0}
.idx-table .bar-val{position:relative;z-index:1}

/* ═══ Screener Table ═══ */
.stable{width:100%;border-collapse:collapse;font-size:0.82rem}
.stable th{text-align:left;padding:10px 12px;color:var(--text3);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border2);font-weight:600;cursor:pointer}
.stable th:hover{color:var(--accent)}
.stable td{padding:9px 12px;border-bottom:1px solid var(--border);font-family:var(--mono)}
.stable tbody tr{cursor:pointer;transition:background 0.1s}
.stable tbody tr:hover{background:rgba(194,239,78,0.04)}
.stable .td-name{font-family:var(--font)}
.stable .td-rank{color:var(--text3);font-size:0.75rem;text-align:center}

/* ═══ Compare ═══ */
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.cmp-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.cmp-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.cmp-score{font-family:var(--mono);font-size:1.6rem;font-weight:700;color:var(--accent)}
.cmp-dims{display:flex;flex-direction:column;gap:5px;margin:10px 0}
.cmp-dim{display:flex;align-items:center;gap:8px;font-size:0.75rem}
.cmp-dim-bar{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.cmp-dim-fill{height:100%;border-radius:2px}

/* ═══ Empty ═══ */
.empty{text-align:center;padding:80px 20px;color:var(--text3)}
.empty-icon{font-size:3.5rem;margin-bottom:12px}
.empty-title{font-size:1.1rem;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:0.85rem}
.empty-sub kbd{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:2px 8px;font-family:var(--mono);font-size:0.8rem;color:var(--accent)}

/* ═══ Spinner ═══ */
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ Footer ═══ */
.footer{text-align:center;padding:30px;color:var(--text3);font-size:0.7rem;border-top:1px solid var(--border);margin-top:40px}

/* ═══ Responsive ═══ */
@media(max-width:700px){
  .hero{flex-direction:column;text-align:center}
  .hero-dims{justify-content:center}
  .hero-meta{justify-content:center}
  .grid2,.grid4{grid-template-columns:1fr}
  .mscore-grid{grid-template-columns:repeat(2,1fr)}
  .header{flex-wrap:wrap}
  .header-right{width:100%;margin-top:8px}
}
</style>
</head>
<body>

<div class="app">
  <!-- ═══ Header ═══ -->
  <div class="header">
    <span class="logo">📊 BQAS<span class="logo-sub">v2.0</span></span>
    <select id="marketSelect" onchange="switchMarket(this.value)" style="margin-left:12px;padding:6px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--accent);font-size:0.78rem;font-family:var(--font);cursor:pointer;outline:none">
      <option value="cn">🇨🇳 A股</option>
      <option value="us">🇺🇸 美股</option>
      <option value="hk">🇭🇰 港股</option>
    </select>
    <div class="header-right">
      <button class="pill active" data-tab="score">📈 评分</button>
      <button class="pill" data-tab="screener">📋 排行榜</button>
      <button class="pill" data-tab="compare">⚖️ 对比</button>
      <button class="pill" data-tab="index">📊 市场指数</button>
    </div>
  </div>

  <!-- ═══ Search Bar ═══ -->
  <div class="search-wrap" id="searchWrap">
    <input type="text" id="searchInput" placeholder="输入股票代码或名称搜索…  例如：600519 / 茅台"
           autocomplete="off"
           oninput="handleSearch()"
           onkeydown="if(event.key==='Enter'){const v=this.value.trim().replace(/[^0-9]/g,'').slice(0,6);if(v.length===6){loadScore(v);hideDropdown()}}">
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>

  <!-- ═══ Content ═══ -->
  <div id="content">
    <div class="empty" id="emptyState">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">BQAS · 巴菲特量化选股系统</div>
      <div class="empty-sub">10年财报 · 8年回测 · Spearman 0.87–0.91<br>输入 <kbd>代码</kbd> 或 <kbd>名称</kbd> 开始分析</div>
    </div>
  </div>

  <div class="footer" id="footer">5,515 只A股 · 61,324 条行情数据 · 2016–2025 十年财报</div>
</div>

<script>
// ═══ State ═══
const API = '';
let currentView = 'score';
let currentMarket = 'cn';
let watchlist = JSON.parse(localStorage.getItem('bqas_wl')||'[]');
let currentStock = null;

function switchMarket(market) {
  currentMarket = market;
  // Reset and reload
  currentStock = null;
  if (currentView === 'screener') loadScreener();
  else if (currentView === 'index') loadIndex();
  else if (currentView === 'score') {
    document.getElementById('emptyState')?.remove();
    document.getElementById('content').innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">${market==='cn'?'A股':market==='us'?'美股':'港股'} · 巴菲特量化选股</div>
      <div class="empty-sub">输入代码搜索开始分析</div>
    </div>`;
  }
  // Update search placeholder
  const ph = market==='cn'?'600519 / 茅台':market==='us'?'AAPL / 苹果':'0700.HK / 腾讯';
  document.getElementById('searchInput').placeholder = `输入代码搜索… 例如：${ph}`;
}

// ═══ Footer: load cache freshness ═══
(async function updateFooter(){
  try{
    const r=await fetch(API+'/api/health');
    const d=await r.json();
    const ft=document.getElementById('footer');
    if(d.cache?.built_at){
      const t=new Date(d.cache.built_at);
      const ago=Math.round((Date.now()-t.getTime())/3600000);
      ft.textContent=`因子缓存: ${d.cache.cached_stocks}只 · 更新于 ${ago}小时前 · ${d.stocks}只A股`;
    }
  }catch(e){}
})();

// ═══ Tabs ═══
document.querySelectorAll('.pill[data-tab]').forEach(el => {
  el.addEventListener('click', function(){
    document.querySelectorAll('.pill[data-tab]').forEach(e=>e.classList.remove('active'));
    this.classList.add('active');
    currentView = this.dataset.tab;
    if(currentView==='screener') loadScreener();
    else if(currentView==='compare') loadCompare();
    else if(currentView==='index') loadIndex();
    else if(currentStock) renderScore(currentStock);
  });
});

// ═══ Search ═══
let searchTimer;
function hideDropdown(){document.getElementById('searchDropdown').classList.remove('show')}
async function handleSearch(){
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  const dd = document.getElementById('searchDropdown');
  if(q.length<1){dd.classList.remove('show');return}
  searchTimer = setTimeout(async()=>{
    try{
      const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`);
      const data = await r.json();
      if(!data.length){dd.classList.remove('show');return}
      dd.innerHTML = data.map(s=>{
        const mkt = s.market || 'cn';
        const flag = mkt==='hk'?'🇭🇰':mkt==='us'?'🇺🇸':'';
        return `
        <div class="search-item" onclick="selectStock('${s.code}','${mkt}')">
          <span><span class="si-code">${flag} ${s.code}</span> <span class="si-name">${s.name}</span></span>
          <span class="si-industry">${s.industry||''}</span>
        </div>`;
      }).join('');
      dd.classList.add('show');
    }catch(e){}
  },200);
}
function selectStock(code, market){
  hideDropdown();
  document.getElementById('searchInput').value = '';
  if (market && market !== currentMarket) {
    switchMarket(market);
  }
  loadScore(code);
}
document.addEventListener('click',e=>{if(!e.target.closest('#searchWrap')) hideDropdown()});

// ═══ Load Score ═══
async function loadScore(code){
  document.getElementById('emptyState')?.remove();
  const ct = document.getElementById('content');
  ct.innerHTML = '<div class="empty"><div class="spinner"></div><div class="empty-sub" style="margin-top:14px">分析中…</div></div>';

  try{
    const scoreUrl = currentMarket === 'cn'
      ? `${API}/api/score/${code}`
      : `${API}/api/score-global/${code}?market=${currentMarket}`;
    const [r, rp] = await Promise.all([
      fetch(scoreUrl),
      fetch(`${API}/api/stock-profile/${code}`).catch(()=>null)
    ]);
    const d = await r.json();
    const profile = rp ? await rp.json() : null;
    if(d.error){ct.innerHTML=`<div class="empty"><div style="color:var(--red);font-size:1.2rem">❌</div><div class="empty-sub">${d.error}</div></div>`;return}
    currentStock = d;
    renderScore(d, profile);
    // Add to watchlist
    if(!watchlist.find(w=>w.code===d.code)){watchlist.push({code:d.code,name:d.name});saveWL()}
    // Switch to score tab
    document.querySelectorAll('.pill[data-tab]').forEach(e=>e.classList.remove('active'));
    document.querySelector('.pill[data-tab="score"]').classList.add('active');
    currentView='score';
  }catch(e){
    ct.innerHTML=`<div class="empty"><div style="color:var(--red);font-size:1.2rem">❌</div><div class="empty-sub">网络错误</div></div>`;
  }
}

// ═══ Render Score ═══
function renderScore(d, profile){
  const w = d.scores?.weighted||{};
  const beneish = d.beneish||{};
  const dupont = d.scores?.quality?.roe?.dupont||{};
  const checks = d.blacklist_checks||{};
  const max = {quality:35,value:30,health:20,gov:15};
  const labels = {quality:'企业质量',value:'估值水平',health:'财务健康',gov:'治理安全'};
  const colors = {'quality':'#4ade80','value':'#60a5fa','health':'#fbbf24','gov':'#f472b6'};

  // SVG Ring
  const cx=75,cy=75,r=62,circ=2*Math.PI*r;
  const segs = [
    {pct:(w.quality||0)/max.quality,color:'#4ade80'},
    {pct:(w.value||0)/max.value,color:'#60a5fa'},
    {pct:(w.health||0)/max.health,color:'#fbbf24'},
    {pct:(w.gov||0)/max.gov,color:'#f472b6'},
  ].filter(s=>s.pct>0);
  let off=0,arcs='';
  segs.forEach(s=>{
    const len=s.pct*circ;
    arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="8" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="round"/>`;
    off+=len;
  });
  const ring=`<svg viewBox="0 0 150 150" width="140" height="140">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(194,239,78,0.08)" stroke-width="8"/>
    ${arcs}
    <text x="${cx}" y="${cy-8}" text-anchor="middle" fill="#c2ef4e" font-family="'Cascadia Code',monospace" font-size="26" font-weight="700">${(d.total||0).toFixed(0)}</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" fill="#7b6b9e" font-size="10">${d.rating||''} ${d.rating_label||''}</text>
  </svg>`;

  const passTag = d.passed_blacklist
    ? '<span class="tag tag-ok">✓ 通过否决</span>'
    : `<span class="tag tag-bad">⛔ ${d.blacklist_reason||''}</span>`;

  let bTag,bBadgeBg,bBadgeColor;
  if(beneish.likely_manipulator){bTag=['🔴 高度嫌疑','tag-bad'];bBadgeBg='rgba(248,113,113,0.15)';bBadgeColor='#f87171'}
  else if(beneish.possible_manipulator){bTag=['🟡 可能操纵','tag-warn'];bBadgeBg='rgba(251,191,36,0.15)';bBadgeColor='#fbbf24'}
  else{bTag=['🟢 无嫌疑','tag-ok'];bBadgeBg='rgba(74,222,128,0.12)';bBadgeColor='#4ade80'}

  document.getElementById('content').innerHTML = `
  <!-- Hero -->
  <div class="hero">
    <div class="hero-ring">${ring}</div>
    <div class="hero-info">
      <div>
        <span class="hero-name">${d.name||d.code}</span>
        <span class="hero-code">${d.code}</span>
      </div>
      <div class="hero-meta">
        <span>${d.industry_group||'?'} / ${d.industry_sw||'?'}</span>
        <span class="dot"></span>
        <span>${d.rating_advice||''}</span>
        <span class="dot"></span>
        ${passTag}
        <span class="tag ${bTag[1]}">${bTag[0]} M=${beneish.m_score?.toFixed(3)||'?'}</span>
      </div>
      <div class="hero-dims">
        ${['quality','value','health','gov'].map(dim=>`
          <div class="hero-dim">

function renderFactors(d){
  const s = d.scores||{};
  const map = {
    quality:{roe:'ROE稳定性',roic:'ROIC超额',cfo:'CFO质量',gm:'毛利护城河'},
    value:{ev_oe:'EV/OpE',fcf_yield:'FCF Yield',pb_adj:'PB调整'},
    health:{leverage:'杠杆率',ic:'利息覆盖',asset_q:'资产质量'},
    gov:{dividend:'股东回报',audit:'审计治理'},
  };
  const cols={quality:'#4ade80',value:'#60a5fa',health:'#fbbf24',gov:'#f472b6'};
  const dimNames={quality:'企业质量',value:'估值水平',health:'财务健康',gov:'治理安全'};
  let h='';
  for(const[dim,factors]of Object.entries(map)){
    h+=`<div class="factor-group"><div class="factor-group-title">${dimNames[dim]}</div>`;
    for(const[key,label]of Object.entries(factors)){
      const f=s[dim]?.[key]||{};
      const sc=f.score||0;
      h+=`<div class="factor-row">
        <div class="factor-label">${label}</div>
        <div class="factor-bar-wrap"><div class="factor-bar" style="width:${sc*10}%;background:${cols[dim]}"></div></div>
        <div class="factor-val">${sc.toFixed(1)}</div>
      </div>`;
    }
    h+=`</div>`;
  }
  return h;
}

function renderBlacklist(checks){
  const map = {
    st_flag:'ST / *ST',listing_days:'上市 ≥ 3年',market_cap:'市值 ≥ 30亿',avg_volume:'日均成交 ≥ 2000万',
    net_loss_3y:'无连续3年亏损',ocf_negative_3y:'经营现金流正常',audit_opinion:'标准无保留审计意见',
    goodwill_bomb:'商誉安全(≤50%)',pledge_ratio:'质押率 < 70%',financial_fraud:'无造假处罚',
  };
  return `<div class="factor-group-title" style="margin-bottom:8px">一票否决清单</div>`+
    Object.entries(map).map(([k,label])=>{
      const v=checks[k];
      const ok=v===true||(typeof v==='string'&&!v)||(Array.isArray(v)&&v[0]);
      return`<div class="bl-row">
        <span class="bl-icon" style="color:${ok?'var(--green)':'var(--red)'}">${ok?'✓':'✗'}</span>
        <span>${label}</span>
        ${!ok?`<span class="bl-reason">${typeof v==='string'?v:v?.[1]||''}</span>`:''}
      </div>`;
    }).join('');
}

// ═══ Compare ═══
function loadCompare(){
  const codes = watchlist.map(w=>w.code).slice(0,5);
  const ct = document.getElementById('content');
  if(codes.length<2){
    ct.innerHTML=`<div class="empty"><div class="empty-icon">⭐</div><div class="empty-title">需要至少 2 只自选股</div><div class="empty-sub">搜索评分后会自动加入自选列表</div></div>`;
    return;
  }
  ct.innerHTML='<div class="empty"><div class="spinner"></div><div class="empty-sub" style="margin-top:14px">对比中…</div></div>';
  fetch(`${API}/api/compare?codes=${codes.join(',')}`).then(r=>r.json()).then(data=>{
    if(Array.isArray(data)) renderCompare(data);
    else ct.innerHTML='<div class="empty"><div style="color:var(--red)">对比失败</div></div>';
  }).catch(()=>ct.innerHTML='<div class="empty"><div style="color:var(--red)">网络错误</div></div>');
}

function renderCompare(data){
  const max={quality:35,value:30,health:20,gov:15};
  document.getElementById('content').innerHTML = `
    <div class="section"><div class="section-title">⚖️ 多股对比</div></div>
    <div class="cmp-grid">
    ${data.map(d=>{
      const w=d.scores?.weighted||{};
      const b=d.beneish||{};
      const scoreColor=d.total>=80?'var(--green)':d.total>=60?'var(--blue)':d.total>=40?'var(--amber)':'var(--red)';
      return`<div class="cmp-card">
        <div class="cmp-header">
          <div><b style="color:var(--accent)">${d.code}</b><br><small style="color:var(--text3)">${d.name||''}</small></div>
          <div class="cmp-score" style="color:${scoreColor}">${(d.total||0).toFixed(1)}</div>
        </div>
        <div class="cmp-dims">
        ${Object.entries(max).map(([dim,mx])=>{
          const v=w[dim]||0,pct=Math.min(v/mx*100,100);
          const dc=dim==='quality'?'#4ade80':dim==='value'?'#60a5fa':dim==='health'?'#fbbf24':'#f472b6';
          return`<div class="cmp-dim">
            <span style="width:24px;font-size:0.7rem;color:var(--text3)">${dim[0].toUpperCase()}</span>
            <div class="cmp-dim-bar"><div class="cmp-dim-fill" style="width:${pct}%;background:${dc}"></div></div>
            <span style="font-family:var(--mono);font-size:0.7rem;color:${dc}">${v.toFixed(0)}</span>
          </div>`;
        }).join('')}
        </div>
        <div style="font-size:0.7rem;color:var(--text3);margin-top:6px;display:flex;gap:10px">
          <span>M: <b style="color:${b.likely_manipulator?'var(--red)':b.possible_manipulator?'var(--amber)':'var(--green)'}">${b.m_score?.toFixed(3)||'?'}</b></span>
          <span>${d.passed_blacklist?'<span style="color:var(--green)">✓ 通过</span>':'<span style="color:var(--red)">⛔ 否决</span>'}</span>
        </div>
      </div>`;
    }).join('')}
    </div>`;
}

function toggleIndustry(idx){
  const row = document.getElementById('detail'+idx);
